name: Cleanup Failed or Cancelled Workflows

permissions: write-all

on:
  workflow_dispatch: 
  schedule:
    - cron: "*/15 * * * *" # Every 15 minutes

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Failed or Cancelled Runs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get the 100 most recent workflow runs
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              per_page: 100
            });

            const now = new Date();

            for (const run of runs.data.workflow_runs) {
              const created = new Date(run.created_at);
              const ageMinutes = (now - created) / 1000 / 60;

              // Delete runs if failed or cancelled and older than 60 minutes
              if (run.status === 'completed' && 
                  (run.conclusion === 'failure' || run.conclusion === 'cancelled')) {
                console.log(`Deleting run #${run.id} (${run.name}) created at ${run.created_at}, conclusion: ${run.conclusion}`);
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id
                });
              }
            }
