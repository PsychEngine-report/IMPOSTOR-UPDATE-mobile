name: Build PsychEngine + Release
run-name: FNF VS Impostor Dev Build
on: workflow_dispatch

permissions: write-all

env:
  PROJECT_NAME: VSImpostor
  REPO_PATH: PsychEngine-report/IMPOSTOR-UPDATE-mobile

jobs:
  get-commit-hash:
    runs-on: ubuntu-latest
    outputs:
      commit_hash: ${{ steps.get_commit_hash.outputs.COMMIT_HASH }}
    steps:
      - name: Check Repository
        run: |
          echo "GITHUB_REPOSITORY: $GITHUB_REPOSITORY"
          echo "REPO_PATH: ${{ env.REPO_PATH }}"
          if [[ "$GITHUB_REPOSITORY" != "${{ env.REPO_PATH }}" ]]; then
            echo "Doesn't seem to be correct, returning SIGABRT..."
            exit 6
          else
            echo "Seems to be correct..."
          fi

      - name: Get latest commit hash
        id: get_commit_hash
        run: |
          commit_hash=${GITHUB_SHA::7}
          echo "Latest commit hash is $commit_hash"
          echo "::set-output name=COMMIT_HASH::$commit_hash"

  build:
    name: ${{ matrix.name }}
    needs: get-commit-hash
    strategy:
      matrix:
        include:
          - name: Windows
            os: windows-2022
            setupCommand: ./setup/windows.bat
            buildArgs: "windows -D officialBuild -final -release"
            artifactName: windowsBuild
            artifactPath: export/release/windows/bin/*
            system: Windows
            doCache: "YES"
          - name: MacOS
            os: macos-15
            buildArgs: "macos -D officialBuild -final -release" 
            setupCommand: sh ./setup/unix.sh
            artifactName: macosBuild
            artifactPath: export/release/macos/bin/*
            system: MacOS
            doCache: "YES"
          - name: Linux
            os: ubuntu-22.04
            buildArgs: "linux -D officialBuild -final -release" 
            setupCommand: sh ./setup/unix.sh
            artifactName: linuxBuild
            artifactPath: export/release/linux/bin/*
            system: Linux
            doCache: "YES"
          - name: Android
            os: ubuntu-22.04
            buildArgs: "android -D officialBuild -final -release" 
            setupCommand: sh ./setup/unix.sh
            artifactName: androidBuild
            artifactPath: "export/release/android/bin/app/build/outputs/apk/release/*.apk"
            system: Android
            doCache: "YES"
          - name: iOS
            os: macos-15
            setupCommand: sh ./setup/unix.sh
            buildArgs: "ios -final -release -nosign -D officialBuild"
            artifactName: iOSBuild
            artifactPath: "export/release/ios/build/Release-iphoneos/*.ipa"
            system: iOS
            doCache: "YES"
    uses: ./.github/workflows/build.yml
    with:
        name: ${{ matrix.name }}
        os: ${{ matrix.os }}
        setupCommand: ${{ matrix.setupCommand }}
        buildArgs: ${{ matrix.buildArgs }}
        artifactName: ${{ matrix.artifactName }}
        artifactPath: ${{ matrix.artifactPath }}
        system: ${{ matrix.system }}
        doCache: ${{ matrix.doCache }}

  Releaser:
    needs: [get-commit-hash, build]
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Download Android Build
        uses: actions/download-artifact@main
        with:
           name: androidBuild
           path: /home/runner

      - name: Move Android File
        run: mv /home/runner/${{ env.PROJECT_NAME }}-release.apk /home/runner/${{ env.PROJECT_NAME }}-Android.apk

      - name: Download iOS Build
        uses: actions/download-artifact@main
        with:
          name: iOSBuild
          path: ${{ github.workspace }}

      - name: Move iOS File
        run: mv ${{ github.workspace }}/${{ env.PROJECT_NAME }}.ipa /home/runner/${{ env.PROJECT_NAME }}-iOS.ipa

      - name: Download Windows Build
        uses: actions/download-artifact@main
        with:
          name: windowsBuild
          path: /home/runner/windowsBuild

      - name: Zip Windows Build For Release
        run: |
          cd /home/runner/windowsBuild
          zip -r "/home/runner/${{ env.PROJECT_NAME }}-Windows.zip" .

      - name: Download MacOS Build
        uses: actions/download-artifact@main
        with:
          name: macosBuild
          path: /home/runner/macosBuild

      - name: Zip MacOS Build For Release
        run: |
          cd /home/runner/macosBuild
          zip -r "/home/runner/${{ env.PROJECT_NAME }}-MacOS.zip" .

      - name: Download Linux Build
        uses: actions/download-artifact@main
        with:
          name: linuxBuild
          path: /home/runner/linuxBuild

      - name: Zip Linux Build For Release
        run: |
          cd /home/runner/linuxBuild
          zip -r "/home/runner/${{ env.PROJECT_NAME }}-Linux.zip" .

      - name: Publish The Release
        uses: softprops/action-gh-release@v2
        with:
          name: "DevBuild V${{ github.run_number }}"
          tag_name: "v${{ github.run_number }}"
          make_latest: true
          #prerelease: false
          files: |
            /home/runner/*.apk
            /home/runner/*.ipa
            /home/runner/*.zip